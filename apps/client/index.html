<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="castle-hosting-rev" content="20260530-v15" />
    <script>
      (function () {
        var REV = "20260530-v15";
        try {
          var key = "castle.hosting.rev";
          var url = new URL(window.location.href);
          if (url.searchParams.get("__rev") === REV) {
            sessionStorage.setItem(key, REV);
            return;
          }
          if (sessionStorage.getItem(key) !== REV) {
            sessionStorage.setItem(key, REV);
            url.searchParams.set("__rev", REV);
            window.location.replace(url.toString());
          }
        } catch (e) {
          /* noop */
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Castle Client - Realtime World Map</title>
    <style>
      html, body, #app { margin: 0; width: 100%; height: 100%; background: #02030b; color: #e5f7ff; font-family: Inter, Arial, sans-serif; }
      #hud { position: fixed; top: 16px; left: 16px; right: 16px; display: flex; gap: 12px; align-items: center; z-index: 5; }
      #log { background: rgba(0,0,0,0.6); padding: 8px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; font-size: 12px; }
      #cmd { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); color: #e5f7ff; border-radius: 10px; padding: 8px 10px; min-width: 320px; }
      button { background: #22d3ee; color: #02131a; border: none; border-radius: 10px; padding: 8px 12px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="log">Connecting gateway...</div>
      <input id="cmd" placeholder="SPAWN AGENT castle-01 | Birim oluştur | Créer agent" />
      <button id="send">Send</button>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
