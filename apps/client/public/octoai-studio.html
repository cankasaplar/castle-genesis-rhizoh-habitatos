<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoMind v2.12 - Canli ve Interaktif</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>
    <link rel="stylesheet" href="/studio-shared.css" />
    <script src="/studio-shared.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d; --text-color: #e0e0e0; --card-color: #1a1a1a;
            --border-color: #333; --accent-color: #00ffff;
        }
        body { margin: 0; overflow: hidden; background: var(--bg-color); color: var(--text-color); font-family: monospace; }
        canvas { display: block; }
        #ui-panel { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0, 0, 0, 0.75); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); width: 320px; backdrop-filter: blur(5px); }
        .ui-section { margin-bottom: 15px; }
        .ui-section:last-child { margin-bottom: 0; }
        .ui-section h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent-color); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .command-bar { display: flex; gap: 10px; margin-top: 5px; }
        .dream-button { background-color: var(--accent-color); color: black; font-weight: bold; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s, color 0.3s; flex: 1; }
        .dream-button:hover, .dream-button.recording:hover { background-color: white; color: black;}
        .dream-button.recording { background-color: #f44336; color: white; }
        .log-container { max-height: 100px; overflow-y: auto; font-size: 11px; background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 4px; line-height: 1.4; }
        .status-grid { display: grid; grid-template-columns: 110px 1fr; gap: 8px; font-size: 13px; }
        .status-grid span:first-child { color: #aaa; }
        #dream-controls { display: none; margin-top: 10px; }
        #intent-input { margin-bottom: 10px; }
        #intent-input input { width: 100%; background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; margin-bottom: 8px; box-sizing: border-box;}
        .dream-log-entry { color: #ccc; }
    </style>
</head>
<body>
    <div id="ui-panel">
        <div class="ui-section castle-shell-card" style="padding:10px;">
            <h3 class="castle-shell-title">Shared Studio Settings</h3>
            <div class="status-grid">
                <span>Language:</span>
                <select id="studioLang">
                    <option value="tr">TR</option>
                    <option value="en">EN</option>
                </select>
            </div>
            <div class="note castle-shell-note">Bu ayar GreenRoom ve OCTO sekmeleriyle ortaktir.</div>
        </div>
        <div class="ui-section">
            <h3>RUYA KONTROLU</h3>
            <div id="intent-input">
                <input type="text" id="dream-intent" placeholder="Ruya niyetinizi girin...">
                <button id="btn-start-dream" class="dream-button" style="width:100%">Ruyayi Baslat</button>
            </div>
            <div id="dream-controls" class="command-bar">
                <button class="dream-button" data-affinity="will">Irade</button>
                <button class="dream-button" data-affinity="wisdom">Bilgelik</button>
                <button class="dream-button" data-affinity="wonder">Hayret</button>
                <button class="dream-button" id="btn-end-dream">Bitir</button>
            </div>
        </div>
        <div class="ui-section">
            <h3>KONTROL</h3>
            <div class="command-bar">
                <button class="dream-button" id="btn-spawn-learning">Ogren</button>
                <button class="dream-button" id="btn-spawn-creator">Yaratici</button>
                <button class="dream-button" id="btn-wake-all">Uyan</button>
            </div>
            <div class="command-bar" style="margin-top: 10px;">
                <button class="dream-button" id="btn-spawn-orb">Enerji Topu</button>
                <button class="dream-button" id="btn-spawn-fragile">Kirilgan</button>
            </div>
            <div class="command-bar" style="margin-top: 10px;">
                <button class="dream-button" id="btn-spawn-team">Takim Gorevi</button>
                <button class="dream-button" id="btn-random-roles">Rol Degistir</button>
            </div>
            <div class="command-bar" style="margin-top: 10px;">
                <button class="dream-button" id="btn-heal-all">Iyilestir</button>
                <button class="dream-button" id="btn-record">Kayit</button>
            </div>
        </div>
        <div class="ui-section">
            <h3>DURUM</h3>
            <div id="status-container" class="status-grid">
                <span>XP / Seviye:</span><span id="xp-level">0 / 1</span>
                <span>Ortalama Bag:</span><span id="bond-level">0.00</span>
            </div>
        </div>
        <div class="ui-section">
            <h3>OLAY GUNLUGU</h3>
            <div id="dream-log-container" class="log-container"></div>
        </div>
    </div>
    
    <script type="module">
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 25);
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        class DreamLogSystem {
            constructor() { this.logs = []; this.systemLogs = []; }
            addLog(entry) { if (this.logs.length >= 5) { this.logs.shift(); } this.logs.push(entry); this.render(); }
            addSystemLog(event, details) { const timestamp = new Date().toLocaleTimeString(); const detailsString = details !== undefined ? `: ${JSON.stringify(details)}` : ''; this.systemLogs.unshift(`[${timestamp}] ${event}${detailsString}`); if (this.systemLogs.length > 5) { this.systemLogs.pop(); } this.render(); }
            render() { const container = document.getElementById('dream-log-container'); if(!container) return; container.innerHTML = ''; this.logs.slice().reverse().forEach((log, i) => { const div = document.createElement('div'); div.className = 'dream-log-entry'; div.innerHTML = `<strong>Ruya #${this.logs.length - i}:</strong> "${log.intent}" - ${log.duration}s`; container.appendChild(div); }); if (this.systemLogs.length > 0 && this.logs.length > 0) { const separator = document.createElement('div'); separator.innerHTML = '<hr style="border-color:#333;margin:4px 0;">'; container.appendChild(separator); } this.systemLogs.forEach(log => { const div = document.createElement('div'); div.className = 'dream-log-entry'; div.style.opacity = 0.6; div.textContent = log; container.appendChild(div); }); }
        }

        class TentacleHealthSystem {
            constructor(octoMind) {
                this.octoMind = octoMind;
                this.connectionStrengths = new Map();
                this.maxHoldingTimes = new Map();
                this.holdingStartTimes = new Map();
                this.breakThreshold = 0.2;
                this.recoveryRate = 0.01;
                this.damageRate = 0.05;
            }
            init() { for (let i = 1; i <= 8; i++) { this.connectionStrengths.set(i, 1.0); this.maxHoldingTimes.set(i, 10000); this.holdingStartTimes.set(i, null); } }
            startHolding(tentacleId) { if(this.holdingStartTimes.get(tentacleId) === null) this.holdingStartTimes.set(tentacleId, Date.now()); }
            stopHolding(tentacleId) { this.holdingStartTimes.set(tentacleId, null); }
            update(tentacleId, role, isHoldingOrb, orbData) {
                let strength = this.connectionStrengths.get(tentacleId);
                const holdingStart = this.holdingStartTimes.get(tentacleId);
                if (isHoldingOrb && holdingStart) {
                    const holdingTime = Date.now() - holdingStart;
                    const maxTime = this.maxHoldingTimes.get(tentacleId);
                    let stabilityFactor = 1.0;
                    switch(role) { case 'wrap': stabilityFactor = 1.5; break; case 'grip': stabilityFactor = 1.3; break; case 'release': stabilityFactor = 0.8; break; case 'return': stabilityFactor = 0.7; break; }
                    if (orbData.fragile) stabilityFactor *= 0.7;
                    const timeDamage = (holdingTime / maxTime) * this.damageRate;
                    strength -= timeDamage * (1 / stabilityFactor);
                    if (strength <= this.breakThreshold) { this.breakConnection(tentacleId, orbData); return false; }
                } else {
                    strength = Math.min(1.0, strength + this.recoveryRate);
                }
                this.connectionStrengths.set(tentacleId, strength);
                return true;
            }
            breakConnection(tentacleId, orbData) {
                this.connectionStrengths.set(tentacleId, 0);
                this.holdingStartTimes.set(tentacleId, null);
                this.octoMind.dreamLogSystem.addSystemLog("tentacle_break", { tentacle: tentacleId });
                const tentacle = this.octoMind.tentacleSystem.tentacles.get(tentacleId);
                if (tentacle) {
                    const orbToDrop = this.octoMind.tentacleSystem.getOrbHeldBy(tentacleId);
                    if (orbToDrop) {
                        this.octoMind.tentacleSystem.releaseOrb(tentacleId, orbToDrop);
                        if(orbToDrop.userData.fragile){
                            this.octoMind.tentacleSystem.breakOrb(orbToDrop);
                            this.octoMind.interactiveObjects.removeObject(orbToDrop.uuid);
                        }
                    }
                    tentacle.userData.segments.forEach(segment => {
                        if (segment.material) {
                            const originalColor = this.octoMind.tentacleSystem.roleColors[this.octoMind.tentacleSystem.tentacleRoles[tentacleId]];
                            segment.material.color.setHex(0xff0000);
                            segment.material.emissive.setHex(0xff0000);
                            setTimeout(() => { segment.material.color.setHex(originalColor); segment.material.emissive.setHex(originalColor); }, 1000);
                        }
                    });
                }
            }
            getConnectionStrength(tentacleId) { return this.connectionStrengths.get(tentacleId); }
        }

        class TentacleSystem {
            constructor(octoMind) {
                this.octoMind = octoMind;
                this.tentacles = new Map();
                this.emotionalBonds = new Map();
                this.radius = 2.0;
                this.numSegments = 25;
                this.segmentLength = 0.45;
                this.tentacleRoles = {};
                this.roleColors = {
                    learn: 0xff00ff, create: 0x00ffff, transport: 0xffff00,
                    grip: 0xff8800, wrap: 0x88ff00, deliver: 0x0088ff,
                    release: 0xff0088, return: 0x8800ff
                };
                this.healthSystem = new TentacleHealthSystem(octoMind);
                this.teamTasks = new Map();
                this.orbHolders = new Map();
                this.roleCooldowns = new Map();
                this.missionQueue = [];
                this.activeEffects = new Set();
            }
            init() {
                this.createTentacles();
                this.healthSystem.init();
                const roles = Object.keys(this.roleColors);
                for (let i = 1; i <= 8; i++) this.tentacleRoles[i] = roles[i-1];
                this.updateAllTentacleColors();
            }
            createTentacles() { for (let i = 1; i <= 8; i++) { const angle = (i / 8) * Math.PI * 2; const tentacle = this.createTentacle(angle, i); this.tentacles.set(i, tentacle); this.emotionalBonds.set(i, 0); } }
            createTentacle(angle, id) { const tentacleGroup = new THREE.Group(); const segments = []; const material = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.1 }); for (let i = 0; i < this.numSegments; i++) { const radius = THREE.MathUtils.lerp(0.2, 0.05, i / this.numSegments); const geometry = new THREE.SphereGeometry(radius, 8, 8); const segment = new THREE.Mesh(geometry, material.clone()); segments.push(segment); tentacleGroup.add(segment); } this.octoMind.scene.add(tentacleGroup); tentacleGroup.userData = { segments, angle, id }; return tentacleGroup; }
            spawnEnergyOrb(role, options = {}) {
                const geometry = new THREE.SphereGeometry(0.5, 16, 16);
                const material = new THREE.MeshPhongMaterial({ color: this.roleColors[role], emissive: this.roleColors[role], emissiveIntensity: 0.5 });
                const orb = new THREE.Mesh(geometry, material);
                orb.position.set(Math.random() * 20 - 10, 2, Math.random() * 20 - 10);
                orb.userData = { role, type: 'energy_orb', mission: options.mission || role, destination: options.destination || null, timeLimit: options.timeLimit || 30000, fragile: options.fragile || false, spawnTime: Date.now(), requiresTeam: options.requiresTeam || false };
                this.octoMind.interactiveObjects.addObject(orb);
                this.octoMind.dreamLogSystem.addSystemLog("orb_spawned", { role, fragile: orb.userData.fragile, team: orb.userData.requiresTeam });
                return orb;
            }
            createVisualEffect(position, type, color = 0xffff00) {
                const effect = new THREE.Group();
                const duration = 1000 + Math.random() * 500;
                switch(type) {
                    case 'delivery': {
                        const glow = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 }));
                        effect.add(glow);
                        const animate = (startTime) => {
                            const progress = (Date.now() - startTime) / duration;
                            if (progress < 1) {
                                glow.scale.setScalar(1 + progress * 2);
                                glow.material.opacity = 0.5 * (1 - progress);
                                requestAnimationFrame(() => animate(startTime));
                            } else { this.octoMind.scene.remove(effect); this.activeEffects.delete(effect); }
                        };
                        animate(Date.now());
                        break;
                    }
                    case 'break': {
                        for (let i = 0; i < 20; i++) {
                            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 }));
                            particle.position.copy(position);
                            particle.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.1, (Math.random() - 0.5) * 0.1, (Math.random() - 0.5) * 0.1);
                            effect.add(particle);
                        }
                        const animate = (startTime) => {
                            const progress = (Date.now() - startTime) / duration;
                            if (progress < 1) {
                                effect.children.forEach(p => { p.position.add(p.userData.velocity); p.userData.velocity.multiplyScalar(0.98); p.material.opacity = 0.8 * (1 - progress); });
                                requestAnimationFrame(() => animate(startTime));
                            } else { this.octoMind.scene.remove(effect); this.activeEffects.delete(effect); }
                        };
                        animate(Date.now());
                        break;
                    }
                    case 'roleChange': {
                        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 16, 32), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 }));
                        ring.rotation.x = Math.PI / 2;
                        effect.add(ring);
                        const animate = (startTime) => {
                            const progress = (Date.now() - startTime) / 800;
                            if (progress < 1) {
                                ring.scale.setScalar(1 + progress);
                                ring.material.opacity = 0.8 * (1 - progress);
                                requestAnimationFrame(() => animate(startTime));
                            } else { this.octoMind.scene.remove(effect); this.activeEffects.delete(effect); }
                        };
                        animate(Date.now());
                        break;
                    }
                }
                effect.position.copy(position);
                this.octoMind.scene.add(effect);
                this.activeEffects.add(effect);
            }
            startRoleCooldown(tentacleId) {
                this.roleCooldowns.set(tentacleId, Date.now());
                const tentacle = this.tentacles.get(tentacleId);
                if (tentacle) {
                    const position = tentacle.userData.segments[0].getWorldPosition(new THREE.Vector3());
                    this.createVisualEffect(position, 'roleChange', this.roleColors[this.tentacleRoles[tentacleId]]);
                }
            }
            canChangeRole(tentacleId) { const lastChange = this.roleCooldowns.get(tentacleId); if (!lastChange) return true; return Date.now() - lastChange > 5000; }
            assignNewRoleToTentacle(tentacleId, newRole) {
                if (this.tentacleRoles[tentacleId] && this.canChangeRole(tentacleId)) {
                    this.tentacleRoles[tentacleId] = newRole;
                    this.startRoleCooldown(tentacleId);
                    this.octoMind.dreamLogSystem.addSystemLog("tentacle_reassigned", { tentacle: tentacleId, new_role: newRole });
                    this.updateTentacleColor(tentacleId);
                }
            }
            updateTentacleColor(tentacleId) {
                const tentacle = this.tentacles.get(tentacleId);
                const newRole = this.tentacleRoles[tentacleId];
                if (tentacle && newRole) {
                    const color = this.roleColors[newRole];
                    tentacle.userData.segments.forEach(segment => { if (segment.material) { segment.material.color.setHex(color); segment.material.emissive.setHex(color); } });
                }
            }
            updateAllTentacleColors() { for (let i = 1; i <= 8; i++) this.updateTentacleColor(i); }
            breakOrb(orb) { this.createVisualEffect(orb.position, 'break', orb.material.color.getHex()); this.octoMind.dreamLogSystem.addSystemLog("orb_broken", { role: orb.userData.role }); }
            addMission(orb, destination, requiresTeam = false) { const mission = { id: orb.uuid, orb, destination, requiresTeam, status: 'pending', assignedTentacles: new Set() }; this.missionQueue.push(mission); this.octoMind.dreamLogSystem.addSystemLog("mission_created", { role: orb.userData.role, destination: destination.name }); return mission.id; }
            checkOrbDelivery(orb) { const mission = this.missionQueue.find(m => m.orb.uuid === orb.uuid); if (!mission || !mission.destination) return false; const distance = orb.position.distanceTo(mission.destination.position); if (distance < 1.5) { this.completeMission(orb); return true; } return false; }
            completeMission(orb) {
                const missionIndex = this.missionQueue.findIndex(m => m.orb.uuid === orb.uuid);
                if (missionIndex !== -1) {
                    const mission = this.missionQueue[missionIndex];
                    const xpGain = mission.requiresTeam ? 100 : 50;
                    this.octoMind.gainXP(xpGain);
                    mission.assignedTentacles.forEach(tentacleId => { this.updateEmotionalBond(tentacleId, 0.2); this.releaseOrb(tentacleId, orb); });
                    this.createVisualEffect(orb.position, 'delivery', orb.material.color.getHex());
                    this.octoMind.interactiveObjects.removeObject(orb.uuid);
                    this.octoMind.dreamLogSystem.addSystemLog("mission_completed", { role: orb.userData.role, xp: xpGain });
                    this.missionQueue.splice(missionIndex, 1);
                }
            }
            update(time) {
                const { affinityLevels, body } = this.octoMind;
                this.missionQueue.forEach(mission => {
                    const { orb, status, assignedTentacles } = mission;
                    if (status === 'pending') {
                        for (let i = 1; i <= 8; i++) {
                            if(this.tentacleRoles[i] === orb.userData.role && !this.isTentacleBusy(i)){
                                assignedTentacles.add(i); mission.status = 'in_progress'; this.octoMind.dreamLogSystem.addSystemLog("mission_assigned", { tentacle: i, mission: orb.userData.role }); if(!mission.requiresTeam) break;
                            }
                        }
                    }
                });
                this.tentacles.forEach((tentacle, id) => {
                    const segments = tentacle.userData.segments;
                    const bond = this.emotionalBonds.get(id) || 0;
                    const activity = 1 + bond;
                    const angle = tentacle.userData.angle;
                    const role = this.tentacleRoles[id];
                    let finalTarget = null;
                    let isHoldingOrb = this.getOrbHeldBy(id) !== null;
                    const activeMission = this.missionQueue.find(m => m.assignedTentacles.has(id) && m.status === 'in_progress');
                    if (activeMission) {
                        const { orb, destination } = activeMission;
                        isHoldingOrb = this.orbHolders.get(orb.uuid)?.has(id) || false;
                        if(!isHoldingOrb && this.healthSystem.getConnectionStrength(id) > this.healthSystem.breakThreshold){
                            finalTarget = orb.position;
                            if(orb.position.distanceTo(segments[segments.length-1].position) < 1.0){ this.holdOrb(id, orb); isHoldingOrb = true; }
                        }
                        if(isHoldingOrb && destination){ this.carryOrb(id, orb, destination.position); finalTarget = segments[segments.length-1].position; this.checkOrbDelivery(orb); }
                    }
                    if (!this.healthSystem.update(id, role, isHoldingOrb, activeMission?.orb.userData)) { this.octoMind.gainXP(-20); return; }
                    if (!finalTarget) {
                        const headTarget = new THREE.Vector3().setFromCylindricalCoords(this.radius, angle, 0).add(body.position);
                        const organicMovement = new THREE.Vector3((affinityLevels.will - affinityLevels.wisdom) * 3, affinityLevels.wonder * 3 + Math.cos(time * 0.9 + id) * activity, 0).applyAxisAngle(new THREE.Vector3(0,1,0), angle);
                        organicMovement.z += Math.sin(time * 0.7 + id) * activity;
                        finalTarget = new THREE.Vector3().copy(headTarget).add(organicMovement);
                    }
                    const lastSegment = segments[segments.length - 1];
                    lastSegment.position.lerp(finalTarget, 0.05);
                    for (let i = segments.length - 2; i >= 0; i--) {
                        const current = segments[i];
                        const next = segments[i + 1];
                        const direction = new THREE.Vector3().subVectors(current.position, next.position).normalize();
                        const idealPosition = new THREE.Vector3().copy(next.position).add(direction.multiplyScalar(this.segmentLength));
                        current.position.lerp(idealPosition, 0.4);
                    }
                    const baseSegment = segments[0];
                    baseSegment.position.lerp(body.position, 1);
                    const health = this.healthSystem.getConnectionStrength(id);
                    let emissiveIntensity = 0.1 + bond * health;
                    if (this.roleCooldowns.has(id) && !this.canChangeRole(id)){
                        const cooldownProgress = (Date.now() - this.roleCooldowns.get(id)) / 5000;
                        emissiveIntensity = Math.max(emissiveIntensity, 0.1 + (1 - cooldownProgress) * 0.8);
                    }
                    segments.forEach(seg => { if (seg.material) seg.material.emissiveIntensity = emissiveIntensity; });
                });
            }
            pulseGesture(tentacleGroup) { const segments = tentacleGroup.userData.segments; segments.forEach((segment, i) => { setTimeout(() => { segment.scale.set(1.5, 1.5, 1.5); setTimeout(() => segment.scale.set(1, 1, 1), 200); }, i * 20); }); }
            updateEmotionalBond(tentacleId, amount) { const bond = this.emotionalBonds.get(tentacleId); this.emotionalBonds.set(tentacleId, Math.min(1.0, Math.max(0, bond + amount))); }
            wakeAll() { this.tentacles.forEach((tentacle) => this.pulseGesture(tentacle)); this.octoMind.dreamLogSystem.addSystemLog("system_wake", "All tentacles awakened"); }
            holdOrb(tentacleId, orb) { if (!this.orbHolders.has(orb.uuid)) this.orbHolders.set(orb.uuid, new Set()); this.orbHolders.get(orb.uuid).add(tentacleId); this.healthSystem.startHolding(tentacleId); }
            releaseOrb(tentacleId, orb) { if (this.orbHolders.has(orb.uuid)) { this.orbHolders.get(orb.uuid).delete(tentacleId); if (this.orbHolders.get(orb.uuid).size === 0) this.orbHolders.delete(orb.uuid); } this.healthSystem.stopHolding(tentacleId); }
            carryOrb(tentacleId, orb, targetPosition) { const holderCount = this.orbHolders.get(orb.uuid)?.size || 1; const speed = 0.05 / holderCount; const direction = new THREE.Vector3().subVectors(targetPosition, orb.position); if (direction.length() > 0.1) { orb.position.add(direction.normalize().multiplyScalar(speed)); return false; } return true; }
            getOrbHeldBy(tentacleId){ for(const [orbUUID, holders] of this.orbHolders.entries()){ if(holders.has(tentacleId)){ return this.octoMind.interactiveObjects.objects.get(orbUUID); } } return null; }
            isTentacleBusy(tentacleId){ return this.getOrbHeldBy(tentacleId) !== null; }
        }

        class InteractiveObjects {
            constructor(octoMind) { this.octoMind = octoMind; this.objects = new Map(); }
            init() { this.octoMind.dreamLogSystem.addSystemLog("init", "Interactive objects system"); }
            spawnObject(type) {
                let geometry, material;
                if (type === 'learning') { geometry = new THREE.OctahedronGeometry(0.8); material = new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.4 }); }
                else { geometry = new THREE.SphereGeometry(1.2, 32, 32); material = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.5 }); }
                const object = new THREE.Mesh(geometry, material);
                object.position.set((Math.random() - 0.5) * 15, Math.random() * 5 + 2, (Math.random() - 0.5) * 15);
                object.userData.type = type;
                this.addObject(object);
            }
            addObject(object) { this.octoMind.scene.add(object); this.objects.set(object.uuid, object); this.octoMind.draggableObjects.push(object); if(object.userData.type !== "energy_orb") this.octoMind.dreamLogSystem.addSystemLog("spawned", { type: object.userData.type }); }
            removeObject(uuid) { const object = this.objects.get(uuid); if (object) { this.octoMind.scene.remove(object); object.geometry.dispose(); object.material.dispose(); this.objects.delete(uuid); const index = this.octoMind.draggableObjects.indexOf(object); if (index > -1) this.octoMind.draggableObjects.splice(index, 1); this.octoMind.dreamLogSystem.addSystemLog("removed", { type: object.userData.type }); } }
            update() { this.objects.forEach(obj => { if (obj.userData.type !== "energy_orb") obj.rotation.y += 0.005; }); }
        }
        
        class OctoMind {
            constructor() {
                this.scene = scene; this.camera = camera; this.renderer = renderer;
                this.controls = controls; this.dirLight = dirLight;
                this.dreamLogSystem = new DreamLogSystem();
                this.tentacleSystem = new TentacleSystem(this);
                this.interactiveObjects = new InteractiveObjects(this);
                this.draggableObjects = [];
                this.bodyTargetPosition = new THREE.Vector3(0, 2, 0);
                this.affinityLevels = { will: 0, wisdom: 0, wonder: 0 };
                this.currentDream = null;
                this.xp = 0; this.level = 1;
                this.isRecording = false; this.mediaRecorder = null; this.recordedChunks = [];
                this.init();
            }
            init() {
                const bodyGeometry = new THREE.IcosahedronGeometry(this.tentacleSystem.radius, 2);
                const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0x1a2a3a, emissive: 0x00ffff, emissiveIntensity: 0.2, shininess: 60 });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.body.position.y = 2;
                this.scene.add(this.body);
                this.tentacleSystem.init();
                this.interactiveObjects.init();
                this.setupEventListeners();
                this.initDragControls();
                this.initScreenRecording();
                setInterval(() => { this.bodyTargetPosition.set((Math.random() - 0.5) * 10, Math.random() * 4 + 1, (Math.random() - 0.5) * 10); }, 10000);
                this.animate();
            }
            initDragControls() {
                const dragControls = new THREE.DragControls(this.draggableObjects, this.camera, this.renderer.domElement);
                dragControls.addEventListener('dragstart', e => { this.controls.enabled = false; e.object.material.emissiveIntensity *= 2; });
                dragControls.addEventListener('dragend', e => { this.controls.enabled = true; e.object.material.emissiveIntensity /= 2; });
            }
            initScreenRecording() {
                try {
                    const stream = this.renderer.domElement.captureStream(30);
                    this.mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                    this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.recordedChunks.push(e.data); };
                    this.mediaRecorder.onstop = () => { const blob = new Blob(this.recordedChunks, { type: 'video/webm' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `octomind-session.webm`; a.click(); URL.revokeObjectURL(url); this.recordedChunks = []; };
                } catch (err) { this.dreamLogSystem.addSystemLog("error", "Ekran kaydi desteklenmiyor."); }
            }
            setupEventListeners() {
                window.addEventListener('resize', () => { this.camera.aspect = window.innerWidth / window.innerHeight; this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight); });
                document.getElementById('btn-start-dream').addEventListener('click', () => this.startDream());
                document.getElementById('btn-end-dream').addEventListener('click', () => this.endDream());
                document.querySelectorAll('[data-affinity]').forEach(btn => btn.addEventListener('click', () => this.applyAffinity(btn.dataset.affinity)));
                document.getElementById('btn-spawn-learning').addEventListener('click', () => this.interactiveObjects.spawnObject('learning'));
                document.getElementById('btn-spawn-creator').addEventListener('click', () => this.interactiveObjects.spawnObject('creator'));
                document.getElementById('btn-wake-all').addEventListener('click', () => this.tentacleSystem.wakeAll());
                const createDestination = (name) => ({ name, position: new THREE.Vector3(Math.random() * 20 - 10, 2, Math.random() * 20 - 10) });
                document.getElementById('btn-spawn-orb').addEventListener('click', () => { const roles = Object.keys(this.tentacleSystem.roleColors); const randomRole = roles[Math.floor(Math.random() * roles.length)]; const orb = this.tentacleSystem.spawnEnergyOrb(randomRole); this.tentacleSystem.addMission(orb, createDestination("Rastgele Hedef")); });
                document.getElementById('btn-spawn-fragile').addEventListener('click', () => { const roles = ['wrap', 'deliver']; const randomRole = roles[Math.floor(Math.random() * roles.length)]; const orb = this.tentacleSystem.spawnEnergyOrb(randomRole, { fragile: true, timeLimit: 20000 }); this.tentacleSystem.addMission(orb, createDestination("Kirilgan Hedef")); });
                document.getElementById('btn-spawn-team').addEventListener('click', () => { const roles = ['grip', 'wrap', 'deliver']; const randomRole = roles[Math.floor(Math.random() * roles.length)]; const orb = this.tentacleSystem.spawnEnergyOrb(randomRole, { fragile: true, requiresTeam: true, timeLimit: 40000 }); this.tentacleSystem.addMission(orb, createDestination("Takim Hedefi"), true); });
                document.getElementById('btn-random-roles').addEventListener('click', () => { const roles = Object.keys(this.tentacleSystem.roleColors); for (let i = 1; i <= 8; i++) { const newRole = roles[Math.floor(Math.random() * roles.length)]; this.tentacleSystem.assignNewRoleToTentacle(i, newRole); } });
                document.getElementById('btn-heal-all').addEventListener('click', () => { for (let i = 1; i <= 8; i++) { this.tentacleSystem.healthSystem.connectionStrengths.set(i, 1.0); this.tentacleSystem.healthSystem.holdingStartTimes.set(i, null); } this.tentacleSystem.updateAllTentacleColors(); this.dreamLogSystem.addSystemLog("system_heal", "All tentacles healed"); });
                const recordBtn = document.getElementById('btn-record');
                recordBtn.addEventListener('click', () => {
                    if (!this.mediaRecorder) return;
                    if (!this.isRecording) { this.mediaRecorder.start(); this.isRecording = true; recordBtn.textContent = 'Kaydi Durdur'; recordBtn.classList.add('recording'); }
                    else { this.mediaRecorder.stop(); this.isRecording = false; recordBtn.textContent = 'Kayit'; recordBtn.classList.remove('recording'); }
                });
            }
            applyTranslations(language) {
                const isTr = language === "tr";
                const setText = (selector, value) => {
                    const el = document.querySelector(selector);
                    if (el) el.textContent = value;
                };
                setText('#btn-start-dream', isTr ? 'Ruyayi Baslat' : 'Start Dream');
                setText('#btn-end-dream', isTr ? 'Bitir' : 'End');
                setText('#btn-spawn-learning', isTr ? 'Ogren' : 'Learn');
                setText('#btn-spawn-creator', isTr ? 'Yaratici' : 'Creator');
                setText('#btn-wake-all', isTr ? 'Uyan' : 'Wake');
                setText('#btn-record', isTr ? 'Kayit' : 'Record');
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                const time = Date.now() * 0.001;
                this.body.position.lerp(this.bodyTargetPosition, 0.01);
                this.body.rotation.y += 0.001;
                this.tentacleSystem.update(time);
                this.interactiveObjects.update(time);
                this.updateUI();
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
            updateUI() {
                const bondLevels = Array.from(this.tentacleSystem.emotionalBonds.values());
                const avgBond = bondLevels.length ? bondLevels.reduce((a, b) => a + b, 0) / bondLevels.length : 0;
                document.getElementById('xp-level').textContent = `${this.xp} / ${this.level * 100}`;
                document.getElementById('bond-level').textContent = avgBond.toFixed(2);
            }
            startDream() {
                const intentInput = document.getElementById('dream-intent');
                if (!intentInput.value.trim()) { this.dreamLogSystem.addSystemLog("dream_error", "Niyet bos olamaz"); return; }
                this.dreamIntent = intentInput.value.trim();
                this.affinityLevels = { will: 0, wisdom: 0, wonder: 0 };
                document.getElementById('dream-controls').style.display = 'flex';
                document.getElementById('intent-input').style.display = 'none';
                this.currentDream = { intent: this.dreamIntent, startTime: Date.now() };
                this.dreamLogSystem.addSystemLog("dream_started", { intent: this.dreamIntent });
            }
            endDream() {
                if (!this.currentDream) return;
                const dreamDuration = (Date.now() - this.currentDream.startTime) / 1000;
                this.dreamLogSystem.addLog({ intent: this.dreamIntent, duration: +dreamDuration.toFixed(1), affinities: { ...this.affinityLevels } });
                document.getElementById('dream-controls').style.display = 'none';
                document.getElementById('intent-input').style.display = 'block';
                document.getElementById('dream-intent').value = "";
                this.currentDream = null;
                this.gainXP(10 + Math.floor(dreamDuration / 2));
            }
            applyAffinity(type) { if (!this.currentDream) return; this.affinityLevels[type] = Math.min(1, this.affinityLevels[type] + 0.2); this.tentacleSystem.pulseGesture(this.tentacleSystem.tentacles.get(Math.floor(Math.random() * 8) + 1)); }
            gainXP(amount) {
                this.xp += Math.round(amount);
                const nextLevelXP = this.level * 100;
                if (this.xp >= nextLevelXP) {
                    this.level++;
                    this.xp = this.xp - nextLevelXP;
                    this.dreamLogSystem.addSystemLog("level_up", `Yeni seviye: ${this.level}`);
                    this.tentacleSystem.createVisualEffect(this.body.position, 'delivery', 0xffd700);
                }
            }
        }
        
        const octoMind = new OctoMind();
        const langSelect = document.getElementById("studioLang");
        const current = window.CastleStudioSettings?.get?.() || { language: "tr" };
        langSelect.value = current.language || "tr";
        octoMind.applyTranslations(langSelect.value);
        langSelect.addEventListener("change", () => {
            window.CastleStudioSettings?.set?.({ language: langSelect.value });
        });
        window.addEventListener("castle:settings-changed", (e) => {
            const lang = e.detail?.language || "tr";
            langSelect.value = lang;
            octoMind.applyTranslations(lang);
        });

        // OCTO extensibility contract (plugin style)
        window.OctoExtensions = {
            plugins: [],
            register(plugin) {
                if (!plugin || typeof plugin !== "object") return;
                this.plugins.push(plugin);
                if (typeof plugin.onInit === "function") plugin.onInit(octoMind);
            }
        };
    </script>
</body>
</html>
