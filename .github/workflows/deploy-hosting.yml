# Manual production deploy: Hosting + Firestore rules + Storage rules.
# Gizli / env şeması: ENV_KEYS.md
# GitHub → Settings → Secrets → Actions (eksiksiz üretim için önerilen):
#   FIREBASE_SERVICE_ACCOUNT_CASTLE_GENESIS — deploy yetkili service account JSON (tam gövde)
#   VITE_FIREBASE_CONFIG — tek satır Web config JSON
#   VITE_GATEWAY_WS veya VITE_GATEWAY_WS_URL — wss://...
#   VITE_GATEWAY_HTTP veya VITE_RHIZOH_LLM_HTTP — https://.../rhizoh/llm
#   VITE_GATEWAY_TOKEN — gateway CASTLE_GATEWAY_TOKEN ile aynı
#   VITE_FIREBASE_CONFIG veya ayrı VITE_FIREBASE_API_KEY, VITE_FIREBASE_PROJECT_ID, …
#   VITE_DRONE_TELEMETRY_WS, VITE_FLIGHT_VIEWER_HTTP (opsiyonel)
#   VITE_SATELLITE_TILE_TEMPLATE, VITE_MAPBOX_TOKEN, VITE_CESIUM_ION_TOKEN (opsiyonel; Ion önerilir)
#   VITE_RHIZOH_LLM_TOKEN (opsiyonel)
#   VITE_TELEMETRY_MAX_HZ, VITE_SIM_DRONE_COUNT (opsiyonel; workflow varsayılan verir)
#   VITE_CASTLE_APP_ID — gateway CASTLE_ARTIFACT_APP_ID ile aynı
#   VITE_GENESIS_DEPLOY_MODE — `observability` (üretim varsayılanı, workflow) | `research` (laboratuvar)
#   VITE_GENESIS_PASSIVE_EPOCH_MAX — pasif epoch penceresi (varsayılan 100)
#   VITE_GENESIS_SIMULATE_LEGACY_DRIFT — yalnız QA; üretim secret vermeyin

name: Deploy Firebase (hosting + rules)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG || '{}' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_GATEWAY_WS: ${{ secrets.VITE_GATEWAY_WS }}
          VITE_GATEWAY_WS_URL: ${{ secrets.VITE_GATEWAY_WS_URL }}
          VITE_GATEWAY_HTTP: ${{ secrets.VITE_GATEWAY_HTTP }}
          VITE_GATEWAY_TOKEN: ${{ secrets.VITE_GATEWAY_TOKEN }}
          VITE_DRONE_TELEMETRY_WS: ${{ secrets.VITE_DRONE_TELEMETRY_WS }}
          VITE_FLIGHT_VIEWER_HTTP: ${{ secrets.VITE_FLIGHT_VIEWER_HTTP }}
          VITE_SATELLITE_TILE_TEMPLATE: ${{ secrets.VITE_SATELLITE_TILE_TEMPLATE }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_RHIZOH_LLM_HTTP: ${{ secrets.VITE_RHIZOH_LLM_HTTP }}
          VITE_ENV: ${{ secrets.VITE_ENV || 'production' }}
          VITE_RHIZOH_LLM_TOKEN: ${{ secrets.VITE_RHIZOH_LLM_TOKEN }}
          VITE_TELEMETRY_MAX_HZ: ${{ secrets.VITE_TELEMETRY_MAX_HZ || '30' }}
          VITE_SIM_DRONE_COUNT: ${{ secrets.VITE_SIM_DRONE_COUNT || '4' }}
          VITE_CASTLE_APP_ID: ${{ secrets.VITE_CASTLE_APP_ID || 'castle-vnext-core' }}
          VITE_GENESIS_DEPLOY_MODE: ${{ secrets.VITE_GENESIS_DEPLOY_MODE || 'observability' }}
          VITE_GENESIS_PASSIVE_EPOCH_MAX: ${{ secrets.VITE_GENESIS_PASSIVE_EPOCH_MAX || '100' }}

      - name: Write Firebase service account
        run: node -e "require('fs').writeFileSync('firebase-ci.json', process.env.GOOGLE_CREDENTIALS)"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CASTLE_GENESIS }}

      - name: Deploy (hosting, Firestore rules, Storage rules)
        run: npx firebase-tools deploy --only hosting,firestore:rules,storage --project castle-genesis --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-ci.json
