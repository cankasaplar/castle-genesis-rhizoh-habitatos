# Manual production deploy: Hosting + Firestore rules + Storage rules.
# Gizli / env şeması: ENV_KEYS.md
# GitHub → Settings → Secrets → Actions (eksiksiz üretim için önerilen):
#   FIREBASE_SERVICE_ACCOUNT_CASTLE_GENESIS — deploy yetkili service account JSON (tam gövde)
#   VITE_FIREBASE_CONFIG — tek satır Web config JSON
#   VITE_GATEWAY_WS veya VITE_GATEWAY_WS_URL — wss://...
#   VITE_GATEWAY_HTTP veya VITE_RHIZOH_LLM_HTTP — https://.../rhizoh/llm
#   VITE_LIVE_GATEWAY_BASE — https://... (gateway kökü; VITE_GATEWAY_HTTP ile aynı origin önerilir — Genesis SSE drift önlemi)
#   VITE_GATEWAY_TOKEN — gateway CASTLE_GATEWAY_TOKEN ile aynı
#   VITE_FIREBASE_CONFIG veya ayrı VITE_FIREBASE_API_KEY, VITE_FIREBASE_PROJECT_ID, …
#   VITE_DRONE_TELEMETRY_WS, VITE_FLIGHT_VIEWER_HTTP (opsiyonel)
#   VITE_SATELLITE_TILE_TEMPLATE, VITE_MAPBOX_TOKEN, VITE_CESIUM_ION_TOKEN (opsiyonel; Ion önerilir)
#   VITE_RHIZOH_LLM_TOKEN (opsiyonel)
#   VITE_TELEMETRY_MAX_HZ, VITE_SIM_DRONE_COUNT (opsiyonel; workflow varsayılan verir)
#   VITE_CASTLE_APP_ID — gateway CASTLE_ARTIFACT_APP_ID ile aynı
#   VITE_GENESIS_DEPLOY_MODE — `observability` (üretim varsayılanı, workflow) | `research` (laboratuvar)
#   VITE_GENESIS_PASSIVE_EPOCH_MAX — pasif epoch penceresi (varsayılan 100)
#   VITE_RHIZOH_INVITE_ONLY_GOOGLE — `1` → girişte yalnızca Google (kapalı kohort UI)
#   VITE_RHIZOH_COHORT_EMAIL_ALLOWLIST — virgülle e-postalar (GitHub secret; uzun string)
#   VITE_RHIZOH_COHORT_SERVER_GATE — `1` → cohortGateV0 HTTPS zorunlu (Functions + COHORT_EMAIL_ALLOWLIST param)
#   VITE_RHIZOH_COHORT_GATE_URL — tam URL; boşsa origin+/api/cohortGateV0
#   VITE_ONTOLOGICAL_BOOT_GATE — `1` = seal öncesi ontological gate açık (IDB living world zorunlu). `0` veya secret yok = kapalı (kohort cold start).

name: Deploy Firebase (hosting + rules)

on:
  workflow_dispatch:
    inputs:
      deploy_track:
        description: "Entry shell track (spatial-main = current main; t0-interface-lock = full monolith @ 8bd4ff9)"
        required: true
        default: t0-interface-lock
        type: choice
        options:
          - t0-interface-lock
          - spatial-main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_track == 't0-interface-lock' && 't0-interface-lock' || github.ref }}

      - name: Resolve deploy track
        id: track
        run: |
          if [ "${{ inputs.deploy_track }}" = "t0-interface-lock" ]; then
            echo "world_layer=1" >> "$GITHUB_OUTPUT"
            echo "deploy_label=t0-interface-lock" >> "$GITHUB_OUTPUT"
          else
            echo "world_layer=${{ secrets.VITE_WORLD_LAYER || '0' }}" >> "$GITHUB_OUTPUT"
            echo "deploy_label=spatial-main" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploy track: ${{ inputs.deploy_track }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG || '{}' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_GATEWAY_WS: ${{ secrets.VITE_GATEWAY_WS }}
          VITE_GATEWAY_WS_URL: ${{ secrets.VITE_GATEWAY_WS_URL }}
          VITE_GATEWAY_HTTP: ${{ secrets.VITE_GATEWAY_HTTP }}
          VITE_LIVE_GATEWAY_BASE: ${{ secrets.VITE_LIVE_GATEWAY_BASE }}
          VITE_GATEWAY_TOKEN: ${{ secrets.VITE_GATEWAY_TOKEN }}
          VITE_DRONE_TELEMETRY_WS: ${{ secrets.VITE_DRONE_TELEMETRY_WS }}
          VITE_FLIGHT_VIEWER_HTTP: ${{ secrets.VITE_FLIGHT_VIEWER_HTTP }}
          VITE_SATELLITE_TILE_TEMPLATE: ${{ secrets.VITE_SATELLITE_TILE_TEMPLATE }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_RHIZOH_LLM_HTTP: ${{ secrets.VITE_RHIZOH_LLM_HTTP }}
          VITE_ENV: ${{ secrets.VITE_ENV || 'production' }}
          VITE_RHIZOH_LLM_TOKEN: ${{ secrets.VITE_RHIZOH_LLM_TOKEN }}
          VITE_TELEMETRY_MAX_HZ: ${{ secrets.VITE_TELEMETRY_MAX_HZ || '30' }}
          VITE_SIM_DRONE_COUNT: ${{ secrets.VITE_SIM_DRONE_COUNT || '4' }}
          VITE_CASTLE_APP_ID: ${{ secrets.VITE_CASTLE_APP_ID || 'castle-vnext-core' }}
          VITE_GENESIS_DEPLOY_MODE: ${{ secrets.VITE_GENESIS_DEPLOY_MODE || 'observability' }}
          VITE_GENESIS_PASSIVE_EPOCH_MAX: ${{ secrets.VITE_GENESIS_PASSIVE_EPOCH_MAX || '100' }}
          VITE_RHIZOH_INVITE_ONLY_GOOGLE: ${{ secrets.VITE_RHIZOH_INVITE_ONLY_GOOGLE }}
          VITE_RHIZOH_COHORT_EMAIL_ALLOWLIST: ${{ secrets.VITE_RHIZOH_COHORT_EMAIL_ALLOWLIST }}
          VITE_RHIZOH_COHORT_OBSERVATION_LOG: ${{ secrets.VITE_RHIZOH_COHORT_OBSERVATION_LOG }}
          VITE_RHIZOH_COHORT_SERVER_GATE: ${{ secrets.VITE_RHIZOH_COHORT_SERVER_GATE }}
          VITE_RHIZOH_COHORT_GATE_URL: ${{ secrets.VITE_RHIZOH_COHORT_GATE_URL }}
          VITE_ONTOLOGICAL_BOOT_GATE: ${{ secrets.VITE_ONTOLOGICAL_BOOT_GATE }}
          VITE_WORLD_LAYER: ${{ steps.track.outputs.world_layer }}
          VITE_WORLD_EXECUTION_MODE: ${{ steps.track.outputs.world_layer == '1' && 'active' || '' }}
          VITE_SATELLITE_NODE_REGISTRY_V0: ${{ inputs.deploy_track == 't0-interface-lock' && '0' || secrets.VITE_SATELLITE_NODE_REGISTRY_V0 }}
          VITE_SOVEREIGN_NODE_ONBOARDING: ${{ inputs.deploy_track == 't0-interface-lock' && '0' || secrets.VITE_SOVEREIGN_NODE_ONBOARDING }}
          VITE_RHIZOH_VOICE_ENGINE_V3: ${{ secrets.VITE_RHIZOH_VOICE_ENGINE_V3 || (inputs.deploy_track == 't0-interface-lock' && '1' || '') }}
          VITE_RHIZOH_VOICE_WITNESS_SHADOW: ${{ secrets.VITE_RHIZOH_VOICE_WITNESS_SHADOW || (inputs.deploy_track == 't0-interface-lock' && '1' || '') }}
          VITE_RHIZOH_VOICE_ATTENTION_MODE: ${{ secrets.VITE_RHIZOH_VOICE_ATTENTION_MODE }}
          VITE_RHIZOH_SHARED_ATTENTION_TYPE: ${{ secrets.VITE_RHIZOH_SHARED_ATTENTION_TYPE }}

      - name: Write Firebase service account
        run: node -e "require('fs').writeFileSync('firebase-ci.json', process.env.GOOGLE_CREDENTIALS)"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CASTLE_GENESIS }}

      - name: Deploy (hosting + Firestore rules)
        run: |
          # CI already built with GitHub secrets; firebase.json predeploy is Windows PowerShell only.
          node -e "const fs=require('fs');const p='firebase.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));delete j.hosting.predeploy;fs.writeFileSync(p,JSON.stringify(j,null,2));"
          # Storage rules need Service Usage + Storage IAM on the deploy SA — deploy separately after IAM fix.
          npx firebase-tools deploy --only hosting,firestore:rules --project castle-genesis --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-ci.json
