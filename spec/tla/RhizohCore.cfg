\* TLC configuration — Phase 0.5 minimal instance
\* Run: tlc -config RhizohCore.cfg RhizohCore.tla
\* Requires TLA+ tools: https://github.com/tlaplus/tlaplus

SPECIFICATION Spec

CONSTANTS
  Packets = {"heartbeat_v1", "malformed", "flood"}

INVARIANT
  CoreUnchanged
  InvNullReject
  ObsNoFeedback

\* Bound exploration depth (state space is already tiny)
CONSTRAINT
  tick <= 20

CHECK_DEADLOCK
TRUE
