# Render Blueprint — Castle Node gateway (Rhizoh HTTP/WS)
# Dashboard: New → Blueprint → bu repo'yu seç → Apply
# https://render.com/docs/infrastructure-as-code
#
# ghost-whisperer vb. başka repolarla karıştırma: bu servis bu monorepodan build alır.
# Deploy sonrası URL örneği: paneldeki tam host (örn. castle-genesis-rhizoh-habitatos.onrender.com) — client VITE_* ile aynı origin kilitle.
# (isim çakışırsa Render benzersiz subdomain verir — paneldeki tam URL’yi client .env’e yaz.)
#
# Gizliler: OPENAI_API_KEY ve CASTLE_GATEWAY_TOKEN → Apply sırasında Render panelinde gir.
# Client: VITE_GATEWAY_TOKEN = CASTLE_GATEWAY_TOKEN (aynı string).

services:
  - type: web
    name: castle-genesis-gateway
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    # Root Directory (Render Dashboard) ile startCommand BİRLİKTE seçilmeli — uyuşmazsa path İKİ KERE yazılır:
    #   rootDir: . (repo kökü)     →  startCommand: node apps/gateway/src/server.js
    #   rootDir: apps/gateway      →  startCommand: node src/server.js   veya  npm start  (asla tekrar apps/gateway/… ekleme)
    rootDir: .
    # Monorepo workspace: ilk deploy için npm install daha toleranslı (npm ci --omit=dev alternatif)
    buildCommand: npm install
    startCommand: node apps/gateway/src/server.js
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: CASTLE_HTTP_CORS_ORIGIN
        value: https://castle-genesis.web.app
      - key: CASTLE_ALLOWED_ORIGINS
        value: https://castle-genesis.web.app,https://castle-genesis.firebaseapp.com,http://localhost:5173
      # --- Auth: Observatory Live v0.1 — prod’da dev bypass kapalı tutun (staging’de geçici true).
      - key: CASTLE_REQUIRE_AUTH
        value: "false"
      - key: CASTLE_ALLOW_DEV_ANON
        value: "false"
      - key: CASTLE_ALLOW_DEV_HTTP_UID
        value: "false"
      # Opsiyonel: boot’ta freeze marker log — CASTLE_GENESIS_OBSERVATORY_LIVE_V01=1
      - key: CASTLE_LLM_PROVIDER
        value: openai
      - key: CASTLE_LLM_MODEL
        value: gpt-4o-mini
      # MVP freeze: spine telemetry / WS patch yayını kapalı (boot + gürültü riski)
      - key: CASTLE_RHIZOH_WS_EMIT_PATCH
        value: "0"
      - key: CASTLE_RHIZOH_SPINE_TRACE
        value: "0"
      - key: CASTLE_RHIZOH_TRACE_SAMPLE
        value: "0"
      - key: CASTLE_GATEWAY_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
