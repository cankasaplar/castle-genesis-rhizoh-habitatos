apiVersion: v1
kind: Namespace
metadata:
  name: castle-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: castle-prometheus-config
  namespace: castle-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: castle-gateway
        metrics_path: /infra/metrics
        static_configs:
          - targets: ["gateway.default.svc.cluster.local:8090"]
      - job_name: castle-worker
        metrics_path: /infra/metrics
        static_configs:
          - targets: ["worker.default.svc.cluster.local:8092"]
  alerts.yml: |
    groups:
      - name: castle-runtime-alerts
        rules:
          - alert: CastleKernelDivergenceReadonly
            expr: castle_kernel_divergence_total > 0
            for: 10s
            labels:
              severity: critical
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: castle-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: castle-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: castle-observability
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
