global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "castle-gateway"
    metrics_path: /infra/metrics
    static_configs:
      - targets: ["gateway:8090"]

  - job_name: "castle-worker"
    metrics_path: /infra/metrics
    static_configs:
      - targets: ["worker:8092"]
